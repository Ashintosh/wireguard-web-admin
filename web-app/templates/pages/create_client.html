{% extends "layouts/base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
{% include "partials/panel_header.html" %}
<div class="form-box">
  <form action="/client/create" method="post">
    <div class="row">
      <label class="required">Client Name</label>
      <input type="text" name="name" required>
    </div>
    <div class="row">
      <label>Description</label>
      <input type="text" name="description">
    </div>
    <div class="row">
      <label class="required">IP Address</label>
      <input type="text" name="ip_address" value="10.0.0.2" required>
    </div>
    <div class="row">
      <label>Additional IP(s)</label>
      <input type="text" name="additional_ips" placeholder="10.0.0.0/24">
    </div>
    <div class="row">
      <label>Keepalive</label>
      <input type="number" name="keepalive" value="25" min="0">
    </div>
    <div class="row">
      <label>DNS Servers</label>
      <input type="text" name="dns" placeholder="9.9.9.9, 149.112.112.112">
    </div>
    <div class="row">
      <label>Expiration Date</label>
      <input type="date" name="expires">
    </div>
    <div class="row">
      <label class="checkbox-row">
        <input type="checkbox" name="enabled" checked>
        Enabled
      </label>
    </div>
    <div class="row center">
      <button type="submit">Create Client</button>
      <a href="/dashboard"><button type="button">Cancel</button></a>
    </div>
  </form>
</div>
{% endblock %}
