{% extends "layouts/base.html" %}
{% block title %}{{ page_title }}{% endblock %}
{% block content %}
{% include "partials/panel_header.html" %}
<div class="form-box">
  <form action="/clients/create" method="post">
    <div class="row">
      <label>Client Name</label>
      <input type="text" name="name" disabled>
    </div>
    <div class="row">
      <label>Description</label>
      <input type="text" name="description">
    </div>
    <div class="row">
      <label>IP Address</label>
      <input type="text" name="ip_address" placeholder="10.0.0.x" disabled>
    </div>
    <div class="row">
      <label>Allowed IPs</label>
      <input type="text" name="allowed_ips" value="10.0.0.0/24">
    </div>
    <div class="row">
      <label>Keepalive</label>
      <input type="number" name="keepalive" value="25" min="0">
    </div>
    <div class="row">
      <label>DNS Servers</label>
      <input type="text" name="dns" placeholder="9.9.9.9, 149.112.112.112">
    </div>
    <div class="row">
      <label>Expiration Date</label>
      <input type="date" name="expires">
    </div>
    <div class="row">
      <label class="checkbox-row">
        <input type="checkbox" name="enabled" checked>
        Enabled
      </label>
    </div>
    <div class="row center">
      <button type="submit">Apply</button>
      <a href="/dashboard"><button type="button">Cancel</button></a>
    </div>
  </form>
</div>
<div class="form-box danger-box">
  <form action="/client/delete" method="post">
    <div class="row center">
      <button type="submit" class="danger-button">Remove Client</button>
      <h4>Note: This action cannot be undone.</h4>
    </div>
  </form>
</div>
{% endblock %}
